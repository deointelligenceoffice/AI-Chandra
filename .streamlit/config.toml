[client]
# This line fixes the 'COLLAPSED' error from your logs
toolbarMode = "minimal"

[theme]
primaryColor = "#238636"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false  # Add this to ensure the Google Login works perfectly
